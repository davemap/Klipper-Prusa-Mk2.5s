# BTT ADXL345 (USB) accelerometer — for input shaping on the Prusa MK2.5S
#
# Identical to the MK3S+ build except the resonance probe point is the MK2.5S bed center.
# The BTT ADXL345 is USB-attached, so it does NOT use the Pi's GPIO SPI and does NOT conflict
# with a HyperPixel panel (you can leave the screen mounted during input shaping).
#
# Build/flash the BTT board's rp2040 firmware first: https://github.com/bigtreetech/ADXL345
# Then find its serial path:  ls /dev/serial/by-id/*
#
# Enable [include adxlmcu-BTT.cfg] in printer.cfg ONLY during the input-shaping session, then
# re-comment it (leaving it on without the board plugged in breaks Klipper startup).
#
# axes_map depends on the mount orientation — swap it between the toolhead (X) and the bed (Y).

[mcu adxl]
# TODO(on-pi): ls /dev/serial/by-id/*  and paste the BTT ADXL345 path here.
# (If you reuse the MK3S+ build's board, re-flash its rp2040 firmware to match this host's Klipper version.)
serial: /dev/serial/by-id/usb-Klipper_rp2040_5044340408726C1C-if00

[adxl345]
cs_pin: adxl:gpio9
spi_software_sclk_pin: adxl:gpio10
spi_software_mosi_pin: adxl:gpio11
spi_software_miso_pin: adxl:gpio8
# Axes map for toolhead mount (X-axis calibration):
#axes_map: z, x, y
# Axes map for bed mount (Y-axis calibration):
axes_map: -y, -x, z

[resonance_tester]
accel_chip: adxl345
# Probe point at the center of the MK2.5S bed (250 x 210mm -> 125,105):
probe_points:
   125,105,20

# More info: https://www.klipper3d.org/Config_Reference.html#adxl345
