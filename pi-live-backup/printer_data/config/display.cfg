# Display — BTT SKR Mini E3 V3.0 (MK2.5S conversion)
# ==================================================
# Stock Prusa 20x4 HD44780 *CHARACTER* LCD (a 2004A) + rotary dial + beeper. (NOT a graphic 12864.)
# Coexists with the HyperPixel/KlipperScreen on the Pi (two independent UIs).
#
# ⚠️ ROOT-CAUSE NOTE (diagnosed 2026-06-29, multi-agent + independent re-derivation).
#   Earlier garbled-then-blank was NOT a logic-level problem and NOT a wiring/firmware error.
#   It was the PIN CHOICE: D6/D7 had been put on PC12 (PWR-DET) and PC2 (Z-STOP). Those endstop
#   inputs carry an onboard ~100nF debounce cap (1K series + 100nF + 10K pull-up). The cap smears
#   the fast LCD data edges so D6/D7 latched garbage (D4=PB9/D5=PA1 were on CLEAN pins and worked —
#   which is exactly why only the upper two bits corrupted). Graphic 12864s "just work" because they
#   need only 3 LCD lines and fit entirely on EXP1's 7 clean GPIOs; a parallel HD44780 needs 6, so
#   something must spill onto spare pins — the fix is to spill the SLOW signals, never the data lines.
#   No level shifter / diode needed: HD44780 runs fine on the 3.3V SKR when the data pins are clean.
#
# FIX = all 6 data/control lines on CLEAN pins; beeper + dial-click (slow) take the filtered pins.
#
# WIRING (matches firmware-DISPLAY-CLEAN.bin / the Marlin REPRAP_DISCOUNT_SMART_CONTROLLER branch):
#   EXP1: 1 LCD_D6=PB5    2 LCD_D7=PA15   3 BTN_EN1=PA9(TX1)   4 RESET(button→NRST)
#         5 BTN_EN2=PA10(RX1)   6 LCD_D4=PB9   7 LCD_RS=PB8   8 LCD_EN=PD6   9 GND   10 5V
#   LCD_D5  = PA1  (SERVOS header — clean output)
#   BTN_ENC = PC2  (Z-STOP header  — slow click, filter is fine / debounces it)
#   BEEPER  = PC12 (PWR-DET header — buzzer, may sound slightly muffled through the filter)
#   (vs the earlier bad map: D6 moved PC12→PB5, D7 moved PC2→PA15; beeper PB5→PC12; click PA15→PC2.)

[display]
lcd_type: hd44780
rs_pin: PB8            # LCD_RS  (EXP1 pin 7)   clean
e_pin: PD6             # LCD_EN  (EXP1 pin 8)   clean
d4_pin: PB9            # LCD_D4  (EXP1 pin 6)   clean
d5_pin: PA1            # SERVOS  header         clean output
d6_pin: PB5            # LCD_D6  (EXP1 pin 1)   clean  (moved off filtered PC12)
d7_pin: PA15           # LCD_D7  (EXP1 pin 2)   clean  (moved off filtered PC2)
line_length: 20
# Dial. If it scrolls the WRONG way, swap the two encoder_pins. Click polarity via QUERY_BUTTON.
encoder_pins: ^PA10, ^PA9
click_pin: ^!PC2       # Z-STOP header (filtered — fine for a slow button)

### BEEPER — PWR-DET header (PC12). Prusa LCD's buzzer; M300 drives it.
[output_pin BEEPER_pin]
pin: PC12
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001
scale: 1000
