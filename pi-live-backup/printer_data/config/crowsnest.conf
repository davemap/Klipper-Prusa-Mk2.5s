[crowsnest]
log_path: ~/printer_data/logs/crowsnest.log
log_level: verbose
delete_log: true
no_proxy: false

[cam camera1]
mode: ustreamer
enable_rtsp: false
rtsp_port: 8554
port: 8080
device: /dev/v4l/by-id/usb-Image_Processor_USB_2.0_PC_Cam-video-index0
resolution: 640x480
max_fps: 10
# NOTE: YUYV-only camera (no hardware MJPEG) -> ustreamer software-encodes to JPEG.
# Heavy-ish on a Pi 3B+ (shared USB bus with the SKR MCU). Keep res/fps low; raise cautiously.
# Staged 2026-07-04. Service intentionally NOT restarted yet — enable AFTER a clean Benchy.
