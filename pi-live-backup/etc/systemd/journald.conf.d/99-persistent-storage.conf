# Added 2026-07-05 (crash diagnosis). Forces persistent journald so previous boots
# survive a hard reboot. Overrides the Raspberry Pi vendor drop-in
# /usr/lib/systemd/journald.conf.d/40-rpi-volatile-storage.conf (Storage=volatile),
# which was keeping the journal only in /run (RAM) and wiping it on every reboot.
[Journal]
Storage=persistent
SystemMaxUse=200M
