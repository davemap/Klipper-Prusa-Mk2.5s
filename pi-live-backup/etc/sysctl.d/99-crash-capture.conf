# Added 2026-07-05 (crash diagnosis). Make kernel faults capturable via ramoops/pstore.
# panic=10            -> reboot 10s after a panic (lets ramoops finish writing)
# panic_on_oops=1     -> a kernel oops becomes a full panic so it is captured
# panic_on_rcu_stall=1-> a stuck driver (e.g. the HyperPixel/DPI overlay that this Pi is
#                        documented to soft-lock on) becomes a capturable panic instead of
#                        a silent 1-min hardware-watchdog reboot.
kernel.panic = 10
kernel.panic_on_oops = 1
kernel.panic_on_rcu_stall = 1
