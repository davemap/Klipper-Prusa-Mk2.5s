# PrusaSlicer PRINTER profile — Prusa MK2.5S + SKR Mini E3 V3 + E3D Revo 0.4mm (Klipper)
# =====================================================================================
# Import:  PrusaSlicer  ->  File > Import > Import Config Bundle...  ->  pick this file.
#   It adds ONE printer preset: "MK2.5S Klipper SKR Revo 0.4".
#
# This is the PRINTER preset only (the genuinely Klipper-specific machine settings). PAIR IT with
# Prusa's stock **MK2.5S 0.4mm Print + Filament presets** (add the MK2.5S via the Config Wizard once,
# so you get those tuned profiles). If after import Prusa's MK2.5S Print/Filament presets show as
# "incompatible", just untick "Compatible only" in their dropdowns (or detach one) — they work; that's
# only the compatibility filter. Don't hand-recreate the print/filament profiles — Prusa's are good.
#
# Target: PrusaSlicer 2.7+ (gcode_flavor=klipper needs 2.6+, binary_gcode/thumbnails_format need 2.7+).
#   On an older build PrusaSlicer just warns about unknown keys and imports the rest; if "klipper" flavor
#   is unavailable, set G-code flavor = "RepRap/Sprinter" manually.
#
# NOZZLE: set for the 0.4mm Revo you're starting with. The Revo makes nozzle swaps trivial — for a
#   different size, change nozzle_diameter below AND switch to a matching-size Print profile.

[printer:MK2.5S Klipper SKR Revo 0.4]
printer_technology = FFF
printer_model = MK2.5S
printer_variant = 0.4
printer_notes = Klipper conversion: BTT SKR Mini E3 V3.0, E3D Revo 0.4mm, 12V system.\nMachine limits live in Klipper, not here.\nPRINTER_VENDOR_PRUSA3D\nPRINTER_MODEL_MK2.5S\nPRINTER_MODEL_MK25S
printer_vendor =
inherits =

# --- Firmware / flavor ---
gcode_flavor = klipper
silent_mode = 0
remaining_times = 0
# ^ remaining_times=0 on purpose: M73 is not a built-in Klipper command. Mainsail/KlipperScreen show
#   progress from file position anyway. Only set this to 1 if you add an M73 macro in macros.cfg.

# --- Geometry (MK2.5S) ---
bed_shape = 0x0,250x0,250x210,0x210
max_print_height = 210
nozzle_diameter = 0.4
min_layer_height = 0.07
max_layer_height = 0.3
z_offset = 0
single_extruder_multi_material = 0

# --- G-code emission tuned for Klipper ---
# PRINT_START/PRINT_END do the heating + purge; everything else custom is cleared.
start_gcode = PRINT_START EXTRUDER_TEMP=[first_layer_temperature] BED_TEMP=[first_layer_bed_temperature] PRINTER_MODEL="MK2.5S"
end_gcode = PRINT_END
before_layer_gcode =
layer_gcode =
toolchange_gcode =
between_objects_gcode =
color_change_gcode = M600
pause_print_gcode = PAUSE
template_custom_gcode =
binary_gcode = 0
arc_fitting = disabled
use_relative_e_distances = 1
use_firmware_retraction = 0
# Object labels so Mainsail's "cancel object" works (pairs with [exclude_object] in printer.cfg):
gcode_label_objects = firmware
# Mainsail print-preview thumbnails:
thumbnails = 32x32,400x300
thumbnails_format = PNG

# --- Machine limits: time-estimate only, do NOT emit (Klipper owns the real limits) ---
machine_limits_usage = time_estimate_only
machine_max_feedrate_x = 200,200
machine_max_feedrate_y = 200,200
machine_max_feedrate_z = 12,12
machine_max_feedrate_e = 120,120
machine_max_acceleration_x = 1000,1000
machine_max_acceleration_y = 1000,1000
machine_max_acceleration_z = 200,200
machine_max_acceleration_e = 5000,5000
machine_max_acceleration_extruding = 1000,1000
machine_max_acceleration_retracting = 1000,1000
machine_max_acceleration_travel = 1000,1000
machine_max_jerk_x = 8,8
machine_max_jerk_y = 8,8
machine_max_jerk_z = 0.4,0.4
machine_max_jerk_e = 2.5,2.5
machine_min_extruding_rate = 0,0
machine_min_travel_rate = 0,0

# --- Retraction (direct-drive Prusa extruder + Revo) ---
retract_length = 0.8
retract_speed = 35
deretract_speed = 25
retract_before_travel = 1.5
retract_lift = 0.2
retract_lift_above = 0
retract_lift_below = 209
retract_layer_change = 0
retract_before_wipe = 0%
wipe = 0
retract_restart_extra = 0
retract_length_toolchange = 0
retract_restart_extra_toolchange = 0

[presets]
printer = MK2.5S Klipper SKR Revo 0.4
