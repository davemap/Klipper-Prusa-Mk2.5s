#### crowsnest.conf — two USB webcams (MK2.5S's dedicated Pi)
####
#### Copy to: ~/printer_data/config/crowsnest.conf  (overwrites the MainsailOS default single-cam one)
####
#### BANDWIDTH NOTE: if this Pi is a 3B/3B+, ALL USB (both webcams + the printer serial) shares ONE
#### USB 2.0 bus; two cameras at high res/fps can saturate it and cause dropped frames or USB resets.
#### Keep both cameras modest: <=800x600 and <=15fps. On a Pi 4/5 you can raise these.

[crowsnest]
log_path: ~/printer_data/logs/crowsnest.log
log_level: verbose          # change to 'quiet' once everything works
delete_log: true
no_proxy: false

#### Camera 1 ####
[cam camera1]
mode: ustreamer             # ustreamer is light; good default
enable_rtsp: false
rtsp_port: 8554
port: 8080
# TODO(on-pi): set the STABLE by-id path. Run `ls /dev/v4l/by-id/` on the Pi and paste the
# full /dev/v4l/by-id/usb-...-video-index0 path here. Do NOT use /dev/video0 (it reorders on reboot).
device: /dev/v4l/by-id/REPLACE_WITH_CAMERA1_BY_ID
resolution: 800x600
max_fps: 15

#### Camera 2 ####
[cam camera2]
mode: ustreamer
enable_rtsp: false
rtsp_port: 8555
port: 8081                  # MUST differ from camera1's port
# TODO(on-pi): second camera's stable by-id path from `ls /dev/v4l/by-id/`
device: /dev/v4l/by-id/REPLACE_WITH_CAMERA2_BY_ID
resolution: 800x600
max_fps: 15
