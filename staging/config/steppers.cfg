# Steppers — BTT SKR Mini E3 V3.0 + Prusa MK2.5S geometry
# =======================================================
# Pins: from reference/generic-bigtreetech-skr-mini-e3-v3.0.cfg (board-fixed).
# Geometry (rotation_distance, steps/mm, travel, limits): derived from Prusa's OWN MK2.5S
#   firmware, reference/Prusa-MK25S-RAMBo13a.h  ->  DEFAULT_AXIS_STEPS_PER_UNIT {100,100,3200/8,133}
#   at 16 microsteps:  X/Y = 32 mm/rev,  Z = 8 mm/rev (400 steps/mm),  E = 3200/133 = 24.06 mm/rev.
#   Build volume X_MAX 250 / Y_MAX 210 / Z_MAX 210.
#
# !!! MOTOR DIRECTION — VERIFY BEFORE HOMING !!!
# The dir_pin polarity below is the GENERIC SKR default. Whether each axis moves the correct way
# depends on how the Prusa motor connectors plug into THIS board. Before the first G28:
#   - jog each axis a few mm in Mainsail and confirm +X moves right, +Y moves the bed forward
#     (nozzle toward the back of the bed), +Z RAISES the nozzle.
#   - if an axis is reversed, add or remove the `!` on its dir_pin and restart.
# A reversed Z is dangerous (it will drive DOWN on a Z-home) — check Z first, with a hand on reset.

[stepper_x]
step_pin: PB13
dir_pin: !PB12                          # VERIFY direction (see header)
enable_pin: !PB14
microsteps: 16
rotation_distance: 32
# --- SENSORLESS HOMING (active) --- StallGuard endstop; tuning + jumpers in tmc2209.cfg
endstop_pin: tmc2209_stepper_x:virtual_endstop
homing_retract_dist: 0                  # MUST be 0 for sensorless (no second homing pass)
position_endstop: 0
position_min: 0
position_max: 250
homing_speed: 40                        # sensorless needs enough speed to register a stall
# --- MECHANICAL-ENDSTOP fallback (if you ever revert to the MK2.5S X microswitch) ---
#endstop_pin: ^PC0                       # X-STOP header
#position_endstop: 0
#homing_retract_dist: 5

[stepper_y]
step_pin: PB10
dir_pin: !PB2                           # VERIFY direction (see header)
enable_pin: !PB11
microsteps: 16
rotation_distance: 32
# --- SENSORLESS HOMING (active) ---
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 0
position_endstop: -2                    # TUNE: Prusa beds home slightly into the frame; refine on-device
position_min: -4                        # must allow the Y-4 purge move used by PRINT_START / PRUSA_LINE_PURGE
position_max: 210
homing_speed: 40
# --- MECHANICAL-ENDSTOP fallback (MK2.5S Y microswitch) ---
#endstop_pin: ^PC1                       # Y-STOP header
#position_endstop: -2
#homing_retract_dist: 5

[stepper_z]
step_pin: PB0
dir_pin: PC5                            # VERIFY direction — a reversed Z drives DOWN on home (dangerous)
enable_pin: !PB1
microsteps: 16
rotation_distance: 8                    # MK2.5S 8mm-lead leadscrew (400 steps/mm), per Prusa firmware
endstop_pin: probe:z_virtual_endstop    # Z homes off the PINDA probe (see skr-mini-e3-v3.cfg [probe])
position_max: 210
position_min: -2
homing_speed: 8                         # slow, repeatable first touch on the PINDA

[extruder]
step_pin: PB3
dir_pin: !PB4                           # VERIFY direction (extrude vs retract) before any extrusion
enable_pin: !PD1
microsteps: 16
# rotation_distance below = 3200/133 from MK2.5S firmware. MK2.5S extruder gearing differs from the
# MK3S+ (which was 22.96) — do NOT copy the MK3S value. STILL verify via Ellis extruder calibration.
rotation_distance: 24.06015
full_steps_per_rotation: 200
# (heater_pin / sensor_pin / Revo tuning are in skr-mini-e3-v3.cfg and printer.cfg)
