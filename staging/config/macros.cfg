# Macros — Prusa MK2.5S / SKR Mini E3 V3 Klipper build
# ====================================================
# Carried over from the MK3S+ build, with ONE behavioural change: PRINT_START now defaults to
# PRINTER_MODEL="MK2.5S" and runs the PINDA heat-soak path. The MK2.5S has a PINDA2 (a plain
# inductive probe WITHOUT the SuperPINDA's internal temp compensation), so — exactly like the
# MK3/MK3S — it must heat-soak the PINDA before bed mesh, or the first layer drifts with temp.
# Everything else here is board-agnostic and identical to the MK3S+ build.

#Start of Charmin's additions (adapted for MK2.5S):

# Print Start
[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set BED_CAL_TEMP = params.BED_CAL_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(215)|float %}
    {% set EXTRUDER_CAL_TEMP = params.EXTRUDER_CAL_TEMP|default(170)|int %} ; 170*C softens common filaments (PETG/PLA/ASA/ABS) without oozing.
    {% set PRINTER_MODEL = params.PRINTER_MODEL|default("MK2.5S")|string %}
    {% set FILAMENT_TYPE = params.FILAMENT_TYPE|default("PLA")|string %}

    ; MK3S+ (SuperPINDA) would use the bed temp as the cal temp because of internal compensation.
    ; The MK2.5S has a PINDA2 (no internal compensation), so we DON'T do that — we heat-soak instead.
    {% if PRINTER_MODEL == "MK3S+" %}
        {% set BED_CAL_TEMP = BED_TEMP %}
    {% endif %}

    M117 Preheating...
    M140 S{BED_CAL_TEMP}             ; Start bed heating (don't wait)
    M104 S{EXTRUDER_CAL_TEMP}        ; Start heating extruder (don't wait)
    SET_GCODE_OFFSET Z=0.0           ; Reset the G-Code Z offset
    BED_MESH_CLEAR                   ; Clear bed mesh
    G28                              ; Home (XY sensorless, Z via PINDA)
    G90                              ; Absolute positioning
    G0 Z50 F4000                     ; Raise for any nozzle cleaning while the bed heats (keeps PINDA cool)
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_CAL_TEMP-1} MAXIMUM={BED_CAL_TEMP+3}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_CAL_TEMP-1} MAXIMUM={EXTRUDER_CAL_TEMP+5}
    {% if PRINTER_MODEL == 'MK2.5S' or PRINTER_MODEL == 'MK2.5' or PRINTER_MODEL == 'MK3S' or PRINTER_MODEL == "MK3" %}
        ; PINDA(2) has no stored temp-vs-offset table here, so heat-soak it at a fixed position/temp
        ; for repeatable probing (same approach Prusa firmware uses, minus the EEPROM table).
        G0 X20 Y60 Z0.15             ; PINDA preheat position over the bed
        {% for timer in range(45,0,-1) %}
            M117 PINDA Heatsoak...{timer|int}
            G4 P1000
        {% endfor %}
    {% endif %}
    M117 Probing bed...
    BED_MESH_CALIBRATE ADAPTIVE=1    ; Measure bed mesh
    M117 Heating...
    M140 S{BED_TEMP}                 ; Bed to final temp (don't wait)
    M104 S{EXTRUDER_TEMP}            ; Extruder to final temp (don't wait)
    G0 X0 Y-4 Z15 F4000              ; move to purge starting position
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP-1} MAXIMUM={BED_TEMP+3}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP-1} MAXIMUM={EXTRUDER_TEMP+5}
    M117                             ; Clear LCD
    PRUSA_LINE_PURGE                 ; Purge, then ready
    #LINE_PURGE                      ; Use instead of PRUSA_LINE_PURGE if you install KAMP
    #SKEW_PROFILE LOAD=CaliFlower


# Print End
[gcode_macro PRINT_END]
gcode:
    #SET_SKEW CLEAR=1
    M83 ; extruder relative mode
    G1 E-4 ; retract a bit to minimize ooze
    _TOOLHEAD_PARK_PAUSE_CANCEL    ; Park
    G90 ; absolute positioning
    G0 Z{[printer.toolhead.position.z, 50]|max} F300 ; park at least 50mm off the bed
    M84 X Y E    ; Disable steppers
    TURN_OFF_HEATERS    ; Disable heaters
    M106 S0     ; Disable fans
    BED_MESH_CLEAR    ; Clear bed mesh


[gcode_macro PRUSA_LINE_PURGE]
## Purge line macro based on the MK4
gcode:
    SAVE_GCODE_STATE NAME=prusa_line_purge
    M83 ; extruder relative mode
    G0 X0 Y-4 Z15 F4000; move to the purge starting position
    G92 E0 ; reset extruder position
    G1 E3 ; prime hotend
    G0 E7 X15 Z0.2 F500 ; purge
    G0 X25 E4 F500 ; purge
    G0 X35 E4 F650 ; purge
    G0 X45 E4 F800 ; purge
    G0 X48 Z0.05 F8000 ; wipe, move close to the bed
    G0 X51 Z0.2 F8000 ; wipe, move quickly away from the bed
    RESTORE_GCODE_STATE NAME=prusa_line_purge
    G92 E0 ; reset extruder position


[force_move]
enable_force_move: true ; enable FORCE_MOVE and SET_KINEMATIC_POSITION


## Macros below obtained from the original dz0ny repository

[gcode_macro M486]
gcode:
    CLEAR_PAUSE

[gcode_macro G80]
gcode:
    M117 Bed leveling
    BED_MESH_CALIBRATE
    G1 X0 Y0 Z0.4 F4000
    M117
    M400

[gcode_macro G81]
gcode:
 BED_MESH_OUTPUT

[gcode_macro M300]
gcode:
    # Use a default 1kHz tone if S is omitted.
    {% set S = params.S|default(1000)|int %}
    # Use a 10ms duration if P is omitted.
    {% set P = params.P|default(100)|int %}
    SET_PIN PIN=BEEPER_pin VALUE=0.5 CYCLE_TIME={ 1.0/S if S > 0 else 1 }
    G4 P{P}
    SET_PIN PIN=BEEPER_pin VALUE=0

[gcode_macro UNLOAD_FILAMENT]
gcode:
  # Default ram distance/sequence copied from MK3.5 Prusa firmware.
  {% set RAM_DISTANCE = params.RAM_DISTANCE|default(20)|int %}
  SAVE_GCODE_STATE NAME=unload_state
  G91
  {% if params.TEMP is defined or printer.extruder.can_extrude|lower == 'false' %}
    M117 Heating...
    M109 S{params.TEMP|default(220, true)}
  {% endif %}
  SET_FILAMENT_SENSOR SENSOR=fsensor ENABLE=0
  M117 Unloading filament...
  G92 E0.0
  G91
  G1 E{RAM_DISTANCE} F1500      ; ram to build up pressure
  G1 E-50 F2700                 ; fast long retract to thin the whisp
  G1 E-5 F50                    ; slow retract to break the whisp
  G1 E-50 F1500                 ; move filament past gears
  G92 E0.0
  M400
  M117 Remove Filament Now!
  M300 S300 P1000               ; beep
  M117 Filament unloaded!
  RESTORE_GCODE_STATE NAME=unload_state
  SET_FILAMENT_SENSOR SENSOR=fsensor ENABLE=1

[gcode_macro LOAD_FILAMENT]
gcode:
  SAVE_GCODE_STATE NAME=load_state
  G91
  {% if params.TEMP is defined or printer.extruder.can_extrude|lower == 'false' %}
  M117 Heating...
  M109 S{params.TEMP|default(220, true)}
  {% endif %}
  SET_FILAMENT_SENSOR SENSOR=fsensor ENABLE=0
  M117 Loading filament...
  G92 E0.0
  G91
  G1 E70 F400
  G1 E40 F100
  G90
  G92 E0.0
  M400
  M117 Filament loaded!
  SET_FILAMENT_SENSOR SENSOR=fsensor ENABLE=1
  RESTORE_GCODE_STATE NAME=load_state

[delayed_gcode clear_display]
initial_duration: 0.
gcode:
  M117


# Prusa's calibrate Z
[gcode_macro Calibrate_Z]
description: Calibrate Z axis
gcode:
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% if printer.toolhead.homed_axes != "xyz" %}
      G28
    {% endif %}
    G1 X20 Y0
    G1 Z{max_z-10} F2000 #Update with Z height.
    FORCE_MOVE STEPPER=stepper_z Distance=20 Velocity=10
    G1 Z{max_z-50} F2000 # Move down
    G28 # Home again

[gcode_macro PREHEAT_PLA]
gcode:
    M140 S60
    M104 S200

[gcode_macro PREHEAT_PETG]
gcode:
    M140 S90
    M104 S240

[gcode_macro PREHEAT_TPU]
gcode:
    M140 S50
    M104 S190

# Marlin compatibility macros — handle Marlin-style G-code from slicers
[gcode_macro M204]
rename_existing: M204.1
gcode:
    {% set S = params.S|default(printer.configfile.settings.printer.max_accel)|int %}
    {% set P = params.P|default(S)|int %}
    {% set T = params.T|default(S)|int %}
    SET_VELOCITY_LIMIT ACCEL={[P,T]|min}

[gcode_macro M205]
gcode:
    {% set X = params.X|default(5)|float %}
    {% set Y = params.Y|default(5)|float %}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={[X,Y]|min}

# M572 - Prusa firmware pressure advance (S = advance factor)
[gcode_macro M572]
gcode:
    {% if params.S is defined %}
        SET_PRESSURE_ADVANCE ADVANCE={params.S}
    {% endif %}

# M900 - Marlin linear advance (K = advance factor)
[gcode_macro M900]
gcode:
    {% if params.K is defined %}
        SET_PRESSURE_ADVANCE ADVANCE={params.K}
    {% endif %}

# Preheat macros for additional materials
[gcode_macro PREHEAT_ASA]
gcode:
    M140 S100
    M104 S260

[gcode_macro PREHEAT_ABS]
gcode:
    M140 S100
    M104 S255

# Spoolman spool selection macros
[gcode_macro SET_ACTIVE_SPOOL]
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {action_call_remote_method("spoolman_set_active_spool", spool_id=id)}
  {% else %}
    {action_respond_info("Parameter ID is required")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
  {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}

# Color change or filament runout
[gcode_macro M600]
description: Color change or filament runout
gcode:
    {% set X = params.X|default(printer.toolhead.axis_maximum.x / 2)|float %}
    {% set Y = params.Y|default(-4)|float %}
    PAUSE X={X} Y={Y}
    UNLOAD_FILAMENT RAM_DISTANCE=7 ; reuse the unload routine
    M117 Swap filament now
