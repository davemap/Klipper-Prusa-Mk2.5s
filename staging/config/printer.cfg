#####           Prusa MK2.5S + BTT SKR Mini E3 V3.0 + E3D Revo (40W 12V) — Klipper Config
#####
##### Sibling of the MK3S+ build. SAME structure and host-side stack (Mainsail, HyperPixel/
##### KlipperScreen, accelerometer input shaping), but the CONTROL BOARD is different:
#####   MK3S+  = Einsy RAMBo (ATmega2560, TMC2130 SPI, sensorless, AVR make-flash, 32U2 bridge)
#####   MK2.5S = SKR Mini E3 V3.0 (STM32G0B1, TMC2209 UART, native USB, SD-card flash)
##### So einsy-rambo.cfg -> skr-mini-e3-v3.cfg and tmc2130.cfg -> tmc2209.cfg.
#####
##### Look for "TUNE ME" / "VERIFY" / "TODO". Tuning steps are NOT optional. A misconfigured
##### Klipper printer can crash the nozzle into the bed — validate everything on-device.

### UI and Built-in Macros (see macros.cfg for added macros)
[include mainsail.cfg]

### PRINTER — machine limits live here (not in PrusaSlicer)
[printer]
kinematics: cartesian

## STOCK MK2.5S limits (safe default) — from Prusa firmware reference/Prusa-MK25S-RAMBo13a.h:
##   DEFAULT_MAX_FEEDRATE {200,200,12,120}  DEFAULT_MAX_ACCELERATION {1000,1000,200,5000}
max_velocity: 200
max_accel: 1000
minimum_cruise_ratio: 0.5
max_z_velocity: 12
max_z_accel: 200

## FASTER input-shaping profile — unlock these only AFTER input shaping is dialed in (Step 12).
## Z stays modest because the MK2.5S 8mm-lead leadscrews are not built for fast Z.
#max_velocity: 250
#max_accel: 3000
#minimum_cruise_ratio: 0.5
#max_z_velocity: 12
#max_z_accel: 200

## Z-OFFSET
## Copy from your CURRENT stock setting (Menu > Calibration > Z-offset) and make it ABSOLUTE
## (drop the minus). READ IT BEFORE FLASHING — it cannot be recovered afterward. You MUST still
## re-calibrate on-device with PROBE_CALIBRATE (Prusa vs Klipper probe algorithms differ).
[probe]
# TODO(user-supplied): from stock firmware -> Menu > Calibration > Z-offset (make ABSOLUTE).
z_offset = 0.000   # <-- TODO: replace with your recorded value, then PROBE_CALIBRATE on-device.
#z_offset = 0.000 #PETG on regular bed sheet, add/delete/edit as needed
#z_offset = 0.000 #Textured bed sheet, add/delete/edit as needed

[mcu]
# SKR Mini E3 V3 enumerates over native USB as an STM32G0B1 (NO Prusa serial, NO 32U2 bridge).
# TODO(on-pi): run `ls /dev/serial/by-id/*` and paste the exact path. It will look like:
#   /dev/serial/by-id/usb-Klipper_stm32g0b1xx_XXXXXXXXXXXX-if00
serial: /dev/serial/by-id/REPLACE_WITH_SKR_STM32G0B1_SERIAL

### CONTROL BOARD (heaters, thermistors, fans, PINDA probe, filament sensor, bed mesh)
[include skr-mini-e3-v3.cfg]

### BASE SETUP
[include display.cfg]          # HyperPixel/KlipperScreen is primary; EXP1 beeper + LCD options here
[include steppers.cfg]         # SKR pins + MK2.5S geometry + sensorless homing
[include tmc2209.cfg]          # TMC2209 UART drivers + StallGuard sensorless tuning


### HOTEND, BED and EXTRUDER — E3D Revo (40W, 12V core)

[extruder]
##TUNE ME — extruder calibration (Ellis guide). rotation_distance is set in steppers.cfg
## (24.06015 from MK2.5S firmware, NOT the MK3S 22.96 — different gearing). Verify per-machine.
## Idler screw tension first: https://help.prusa3d.com/article/idler-screw-tension_177367

##TUNE ME — MANDATORY. The PID values below are PLACEHOLDERS (generic SKR defaults) and are NOT
## correct for your 40W 12V Revo. The 40W 12V Revo heats DIFFERENTLY from both a stock V6 and the
## MK3S+ build's 60W Revo, so you MUST run on the Pi:
##     PID_CALIBRATE HEATER=extruder TARGET=215   then   SAVE_CONFIG
## SAVE_CONFIG overwrites these three numbers with your machine's real values. Do NOT print first.
control = pid
pid_Kp = 21.527
pid_Ki = 1.063
pid_Kd = 108.982

##TUNE ME — Pressure Advance. Preferred: per-filament SET_PRESSURE_ADVANCE in the slicer
## (see prusaslicer/SETTINGS-CHECKLIST.md). Left commented so it doesn't override the slicer value.
## Tuned via Ellis PA guide, then RE-tuned after input shaping.
#pressure_advance: 0.04

nozzle_diameter: 0.40          # E3D Revo, 0.4mm orifice. Change if you swap nozzles.
min_extrude_temp: 170
min_temp: 0
max_temp: 285                  # Revo core is rated ~300C; 285 leaves margin.
filament_diameter: 1.750
max_extrude_only_distance: 200
max_extrude_cross_section: 50.0
max_extrude_only_velocity: 120.0
max_extrude_only_accel: 1250.0

[heater_bed]
##TUNE ME — MANDATORY. Placeholder PID; run on the Pi:
##     PID_CALIBRATE HEATER=heater_bed TARGET=60   then   SAVE_CONFIG
control = pid
pid_Kp = 54.027
pid_Ki = 0.770
pid_Kd = 948.182


### MACROS
[include macros.cfg]

### INPUT SHAPING
# Uncomment ONE only DURING input-shaping testing (leaving it on without the board plugged in
# breaks Klipper startup). Your accelerometer is the BTT ADXL345 (USB) — same as the MK3S+ build.
#[include adxlmcu-BTT.cfg]
#[include adxlmcu-KUSBA.cfg]

[input_shaper]


### AXIS TWIST COMPENSATION
# Corrects X-axis twist that biases PINDA probing. Run BEFORE bed mesh.
[axis_twist_compensation]
calibrate_start_x: 24
calibrate_end_x: 228
calibrate_y: 105


### OTHER FEATURES OR TUNING
[exclude_object]

### SKEW CORRECTION — last tuning procedure.
[skew_correction]

### FIRMWARE RETRACTION — G10/G11 handled by Klipper; tune live with SET_RETRACTION.
[firmware_retraction]
retract_length: 0.8
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35

### HEATER VERIFICATION — relaxed for the 12V MK42 bed (heats slowly, especially to 90-100C).
[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[verify_heater heater_bed]
max_error: 200
check_gain_time: 90            # 12V bed is slower than the MK3S 24V bed — give it more time
hysteresis: 5
heating_gain: 1

### IDLE TIMEOUT — 30 min (default 10 can cut off filament swaps / setup).
[idle_timeout]
timeout: 1800
gcode:
    TURN_OFF_HEATERS
    M84
    M117 Idle timeout

### PERSISTENT VARIABLES (Spoolman + state-saving macros)
[save_variables]
filename: ~/printer_data/config/saved_variables.cfg

### MISC
[menu __main __octoprint]
type: disabled

[safe_z_home]
# After XY sensorless home, move here and probe Z with the PINDA. This XY puts the PINDA
# (offset +23,+5) safely over the bed. Adjust if your home/offset differ.
home_xy_position: 100,100
speed: 50.0
z_hop: 15
z_hop_speed: 15.0
move_to_previous: False


