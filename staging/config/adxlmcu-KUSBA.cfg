# KUSBA (USB) accelerometer — alternative to the BTT board for MK2.5S input shaping.
# (Your build uses the BTT ADXL345; this is kept only as a drop-in alternative.)

[mcu adxl]
# TODO(on-pi): ls /dev/serial/by-id/*  and paste the KUSBA path here.
serial: /dev/serial/by-id/usb-Anchor_Rampon-if00

[adxl345]
cs_pin: adxl:CS

[resonance_tester]
accel_chip: adxl345
# Probe point at the center of the MK2.5S bed (250 x 210mm -> 125,105):
probe_points:
   125,105,20

# More info: https://www.klipper3d.org/Config_Reference.html#adxl345
