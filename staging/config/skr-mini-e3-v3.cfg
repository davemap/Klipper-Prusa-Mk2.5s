# BTT SKR Mini E3 V3.0 — board pin map for a Prusa MK2.5S conversion
# =================================================================
# This file is the MK2.5S equivalent of the MK3S+ build's `einsy-rambo.cfg`.
# It defines everything that is tied to the CONTROL BOARD: heaters, thermistors,
# fans, the Z probe (PINDA), the filament sensor, and misc board I/O.
# Stepper pins + drivers live in steppers.cfg / tmc2209.cfg; the display lives in display.cfg.
#
# Pin source of truth: the OFFICIAL Klipper config
#   reference/generic-bigtreetech-skr-mini-e3-v3.0.cfg
# (cross-check any pin against that file — board pins are FIXED, do not guess them).
#
# !!! POWER / VOLTAGE — READ FIRST !!!
# The MK2.5S is a **12V** machine. Power this board's VIN from the printer's 12V PSU.
# The SKR Mini E3 V3 fan outputs and the heater MOSFETs switch VIN, so on a 12V system
# the fans get 12V and the Revo/bed heaters get 12V — exactly what this hardware wants.
# DO NOT feed this board 24V: it would over-volt the 12V Revo heater core, the 12V MK42 bed,
# and the 12V fans. Confirm 12V on VIN before powering the heaters.

# WARNING: DO NOT EDIT pin assignments unless you have cross-checked the BTT V3.0 pinout.
# A wrong heater/thermistor pin is dangerous (thermal runaway).


### ---- EXTRUDER HEATER + THERMISTOR (E3D Revo, 40W 12V core) ----
[extruder]
# Stepper pins (step/dir/enable) and the Revo-specific tuning (PID, nozzle, PA, limits)
# are set in steppers.cfg and printer.cfg. Here we only own the heater + sensor pins.
heater_pin: PC8                       # "HE" hotend heater output (switches VIN = 12V)
sensor_pin: PA0                       # "TH0" hotend thermistor input
# TUNE/VERIFY: E3D Revo thermistor type. The MK3S+ Revo build used ATC Semitec 104GT-2.
# E3D currently ships the Revo with a Semitec 104NT-4 — both curves are close; if temps
# read a few degrees off, switch to: ATC Semitec 104NT-4-R025H42G  (verify on E3D's datasheet).
sensor_type: ATC Semitec 104GT-2

[heater_bed]
heater_pin: PC9                       # "HB" bed heater output (switches VIN = 12V)
sensor_pin: PC4                       # "TB" bed thermistor input
sensor_type: EPCOS 100K B57560G104F   # Prusa MK42 (MK2.5S) heatbed thermistor; verify if temps read off
min_temp: 0
max_temp: 120                         # 12V MK42 bed; heats slowly, tops out ~100-110C. Leave headroom, not more.


### ---- FANS ----
# SKR Mini E3 V3.0 fan outputs (all switch VIN = 12V here):
#   FAN0 = PC6   FAN1 = PC7   FAN2 = PB15
# NOTE: FAN2 (PB15) is ALSO EXP1_8 (an LCD data line). With the stock LCD wired to EXP1
# (see display.cfg) you CANNOT use FAN2 — and you don't need it. Use FAN0 + FAN1 only.

# Hotend heatbreak / Noctua fan — must run whenever the hotend is hot (Revo needs cooling).
[heater_fan heatbreak_cooling_fan]
pin: PC7                              # FAN1
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

# Part cooling fan (slicer-controlled M106/M107).
[fan]
pin: PC6                              # FAN0
# NOTE: unlike the MK3S+ Einsy build, no tachometer_pin here — the SKR fan ports have no
# tach input, so there is no RPM feedback / stall detection. The fan still works normally.


### ---- Z PROBE (Prusa PINDA2 inductive sensor) ----
# Wire the PINDA's SIGNAL wire to the board's "PROBE" connector signal pin (PC14).
# Power the PINDA from a 5V + GND pin (the PROBE connector's outer pins, or any board 5V/GND).
# The Prusa PINDA is NPN open-collector: it only SINKS the line to GND when it detects metal,
# so with Klipper's internal pull-up (the `^`) the MCU pin is safe regardless of PINDA supply V.
# VERIFY POLARITY ON-DEVICE with QUERY_PROBE (slide metal under it, the reading must flip).
# If it reads inverted, add a `!`  ->  pin: ^!PC14
[probe]
pin: ^PC14
# TUNE/VERIFY: PINDA offset from the nozzle (PHYSICAL — measure it on YOUR toolhead).
# Values below are the MK3S+ starting point; the MK2.5S PINDA mount is similar but NOT identical.
x_offset: 23
y_offset: 5
#z_offset is set in printer.cfg (so different bed sheets can be swapped there).
speed: 8.0                            # PINDA likes a slow, repeatable probe; tune up later if stable
samples: 3
samples_result: average
sample_retract_dist: 1.0
samples_tolerance: 0.05
samples_tolerance_retries: 3


### ---- FILAMENT SENSOR (MK2.5S IR optical sensor) ----
# The MK2.5S "S" upgrade uses the IR filament sensor (3-wire digital: 5V, GND, signal).
# Wire its signal to the board's "E0-STOP" / filament-detect header (PC15), 5V+GND from a 5V pin.
# VERIFY POLARITY with QUERY_FILAMENT_SENSOR (filament in vs out must toggle detected/not).
# If inverted, flip the `!`  ->  switch_pin: ^PC15
[filament_switch_sensor fsensor]
pause_on_runout: False
runout_gcode:
    M118 Filament Runout Detected
    M600
insert_gcode:
    M118 Filament Load Detected
    LOAD_FILAMENT
event_delay: 3.0
pause_delay: 0.01
switch_pin: ^!PC15


### ---- BOARD / HOST TEMP SENSORS ----
[temperature_sensor mcu_temp]
sensor_type: temperature_mcu          # STM32G0B1 internal temp

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 80


### ---- BED MESH (PINDA probe) ----
# Faulty-region magnet dodging from the MK3S+ build was REMOVED: those coordinates are for the
# MK52 (MK3) bed. The MK2.5S MK42 bed has a DIFFERENT magnet layout, so a clean grid is safer.
# If you find probe points landing on MK42 magnets (noisy mesh), add faulty_region_* lines for
# the MK42 magnet positions then.
[bed_mesh]
speed: 80
horizontal_move_z: 5
algorithm: bicubic
# mesh bounds must stay inside the probe's reachable area (nozzle range minus the PINDA offset).
mesh_min: 24, 6
mesh_max: 230, 200
probe_count: 5,5
mesh_pps: 2,2
fade_start: 1
fade_end: 10


### ---- BED SCREWS (manual tramming helper; M2.5S MK42 3x3) ----
# Positions are NOZZLE-above-the-screw (Klipper moves the nozzle, then you adjust that screw).
# These mirror a standard MK42 3x3 layout; verify against your bed and adjust if the nozzle
# isn't centered over a screw.
[bed_screws]
screw1: 22.5, 18
screw1_name: Front Left
screw2: 115, 18
screw2_name: Front Center
screw3: 207, 18
screw3_name: Front Right
screw4: 22.5, 104
screw4_name: Mid Left
screw5: 115, 104
screw5_name: Center
screw6: 207, 104
screw6_name: Mid Right
screw7: 22.5, 192
screw7_name: Back Left
screw8: 115, 192
screw8_name: Back Center
screw9: 207, 192
screw9_name: Back Right


### ---- MISC BOARD I/O ----
[gcode_arcs]
resolution: 0.25

[respond]
default_type: command

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

# NOTE: [force_move] (enable_force_move) is defined once in macros.cfg (used by Calibrate_Z).
