# Display — BTT SKR Mini E3 V3.0 (MK2.5S conversion)
# ==================================================
# Your PRIMARY display is the HyperPixel on the Pi running KlipperScreen
# (see klipperscreen/SETUP-NOTES.md) — exactly like the MK3S+ build.
#
# You also asked to wire the printer's STOCK LCD to the board. Be aware of a real hardware limit:
#
#   ⚠️  THE SKR MINI E3 V3 HAS ONLY ONE LCD HEADER (EXP1) — there is NO EXP2.
#       EXP1 exposes only 7 usable GPIO (EXP1_4 is RESET, EXP1_9/10 are GND/5V).
#       The Prusa stock LCD is a PARALLEL HD44780 that needs RS+E+D4..D7 (6) PLUS a rotary
#       encoder (2) PLUS click (1) PLUS beeper (1) = 10 signals. They DO NOT all fit on EXP1.
#
# So the stock Prusa LCD cannot be fully driven (display + menu knob + beeper) from this board.
# Your realistic choices:
#   (A) RECOMMENDED — leave the HyperPixel/KlipperScreen as the physical UI, and use just the
#       BEEPER from EXP1 (that one fits — it's active below so M300/feedback tones work).
#   (B) If you want a real on-printer menu knob, fit a BTT mini12864 (SPI) on EXP1 instead of the
#       Prusa LCD — it fits the pin budget. Commented template below.
#   (C) Status-only Prusa HD44780 (no encoder knob) — possible but near-useless given KlipperScreen.
#       Commented template below; verify the Prusa-LCD-to-EXP1 adapter wiring yourself.

### EXP1 pin aliases (SKR Mini E3 V3.0 — board-fixed, from the official Klipper config)
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

### BEEPER (active) — fits EXP1_1 = PB5. Wire the Prusa LCD's beeper (or any piezo) here.
### macros.cfg M300 drives this; harmless if nothing is connected.
[output_pin BEEPER_pin]
pin: PB5
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001
scale: 1000


### ----------------------------------------------------------------------
### OPTION B — BTT mini12864 on EXP1 (uncomment if you fit this display)
### ----------------------------------------------------------------------
#[display]
#lcd_type: uc1701
#cs_pin: EXP1_3
#a0_pin: EXP1_4
#rst_pin: EXP1_5
#contrast: 63
#encoder_pins: ^EXP1_8, ^EXP1_6
#click_pin: ^!EXP1_2
#[neopixel btt_mini12864]
#pin: EXP1_6
#chain_count: 3
#color_order: RGB
#initial_RED: 0.3
#initial_GREEN: 0.3
#initial_BLUE: 0.3

### ----------------------------------------------------------------------
### OPTION C — Prusa stock HD44780, STATUS-ONLY (no encoder; needs an EXP1 adapter)
### Maps 6 data/control lines + click; there are NOT enough EXP1 pins left for the knob.
### Verify your Prusa-LCD-ribbon -> EXP1 adapter pinout before enabling. UNVERIFIED.
### ----------------------------------------------------------------------
#[display]
#lcd_type: hd44780
#rs_pin: EXP1_3
#e_pin: EXP1_5
#d4_pin: EXP1_6
#d5_pin: EXP1_7
#d6_pin: EXP1_8
#d7_pin: EXP1_2
#click_pin: ^!EXP1_2     # NOTE: collides with d7 above — proof the knob doesn't fit. Pick one.
