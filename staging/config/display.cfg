# Display — BTT SKR Mini E3 V3.0 (MK2.5S conversion)
# ==================================================
# DECISION: TOUCHSCREEN-ONLY. The physical UI is the HyperPixel on the Pi running KlipperScreen
# (see klipperscreen/SETUP-NOTES.md); Mainsail in a browser is the other UI. No board-connected
# LCD is used. This file therefore only wires the BEEPER (so M300/feedback tones work).
#
# Why not the stock Prusa LCD or its knob:
#   - The SKR Mini E3 V3 has ONE LCD header (EXP1, no EXP2) with only 7 usable GPIO. A Prusa parallel
#     HD44780 + encoder + beeper needs ~10 signals — it does not fit.
#   - A bare rotary encoder DOES fit, but in Klipper an encoder only drives the on-board [display]
#     MENU (which needs a board LCD), and it does NOT control KlipperScreen. So a knob alone does nothing.
#
# WANT A PHYSICAL KNOB LATER? Fit a BTT mini12864 (graphic LCD + built-in encoder; SPI, fits EXP1).
#   Copy the "uc1701" [display] block from reference/klipper-sample-lcd.cfg into this file and uncomment.

### EXP1 pin aliases (SKR Mini E3 V3.0 — board-fixed, from the official Klipper config)
### Kept so the beeper below (and a future mini12864) can use EXP1_x names.
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

### BEEPER — EXP1_1 (PB5). Wire any piezo here for M300; harmless if nothing is connected.
[output_pin BEEPER_pin]
pin: EXP1_1
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001
scale: 1000
