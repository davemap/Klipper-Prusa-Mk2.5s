# Display — BTT SKR Mini E3 V3.0 (MK2.5S conversion)
# ==================================================
# SETUP: the stock Prusa 20x4 HD44780 LCD + rotary dial + beeper, working. No SD card.
# Coexists with the HyperPixel/KlipperScreen on the Pi (two independent UIs).
#
# The SKR has only EXP1 (no EXP2), so this takes TWO connections:
#   1) LCD + beeper on EXP1 (with one re-route — see below).
#   2) The encoder/dial's 3 wires (from the Prusa display's EXP2) to spare board pins.
#      (Approach per BTT issue #159 — route the EXP2 signals to free GPIO.)
#
# ⚠️ EXP1 WIRING — the Prusa ribbon is NOT 1:1-compatible: the SKR's EXP1 pin 4 is RESET, but the Prusa
#   ribbon puts LCD_RS on pin 4. So MOVE RS to EXP1 pin 2 (PA15, the freed encoder-button pin). Final EXP1:
#     pin1=BEEPER  pin2=LCD_RS(moved)  pin3=LCD_EN  pin4=empty(RST)  pin5=D4  pin6=D5  pin7=D6  pin8=D7
#
# 🔌 DIAL WIRING — from the Prusa display's EXP2, run 3 individual wires to spare SKR pins:
#     EXP2 BTN_EN1 (pin 3) → PA1   (SERVOS header)
#     EXP2 BTN_EN2 (pin 5) → PC12  (PWR-DET header)
#     EXP2 BTN_ENC (pin 7) → PC2   (Z-STOP header — free; PINDA does Z homing)
#   GND/5V come from EXP1. The EXP2 SD-card pins are left disconnected.

### EXP1 pin aliases (SKR Mini E3 V3.0 — board-fixed)
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

### Stock Prusa HD44780 (20x4) + dial
[display]
lcd_type: hd44780
rs_pin: EXP1_2          # LCD_RS — moved off the RST pin (see wiring note)
e_pin: EXP1_3           # LCD_EN
d4_pin: EXP1_5
d5_pin: EXP1_6
d6_pin: EXP1_7
d7_pin: EXP1_8
line_length: 20
# Dial on spare pins. If it scrolls the WRONG way, swap the two encoder_pins. click polarity via QUERY.
encoder_pins: ^PA1, ^PC12
click_pin: ^!PC2

### BEEPER — EXP1_1 (PB5). Prusa LCD's buzzer; M300 drives it.
[output_pin BEEPER_pin]
pin: EXP1_1
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001
scale: 1000
