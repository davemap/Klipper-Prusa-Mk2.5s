# Display — BTT SKR Mini E3 V3.0 (MK2.5S conversion)
# ==================================================
# SETUP: the stock Prusa 20x4 HD44780 LCD, wired DISPLAY-ONLY to EXP1 (no encoder/dial, no SD).
# The HyperPixel + KlipperScreen still runs on the Pi as the touch UI — the two coexist (Klipper drives
# this character LCD's status screen; KlipperScreen is independent on the HyperPixel).
#
# ⚠️ WIRING — the Prusa EXP1 ribbon is NOT pin-compatible with the SKR's EXP1:
#   The SKR's EXP1 pin 4 is RESET (not a usable GPIO), but the Prusa ribbon puts LCD_RS on pin 4.
#   So a straight 1:1 ribbon does NOT work. Since the encoder is dropped, RS is moved to EXP1 pin 2
#   (PA15, the now-unused encoder-button pin). Final EXP1 usage:
#     pin1=BEEPER  pin2=LCD_RS(moved)  pin3=LCD_EN  pin4=empty(RST)  pin5=D4  pin6=D5  pin7=D6  pin8=D7
#   (Prusa ribbon's BTN_ENC on pin2 and everything on EXP2 = left disconnected.)
#
# No encoder/click_pin = status-only (no on-LCD menu navigation). That's intended — navigation is on
# KlipperScreen. Want a knob later? A BTT mini12864 fits EXP1 (uc1701 block in reference/klipper-sample-lcd.cfg).

### EXP1 pin aliases (SKR Mini E3 V3.0 — board-fixed)
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

### Stock Prusa HD44780 (20x4), display-only
[display]
lcd_type: hd44780
rs_pin: EXP1_2          # LCD_RS — moved here off the RST pin (see wiring note above)
e_pin: EXP1_3           # LCD_EN
d4_pin: EXP1_5
d5_pin: EXP1_6
d6_pin: EXP1_7
d7_pin: EXP1_8
line_length: 20
# no encoder_pins / click_pin on purpose (display-only; navigation is on KlipperScreen)

### BEEPER — EXP1_1 (PB5). Prusa LCD's buzzer; M300 drives it.
[output_pin BEEPER_pin]
pin: EXP1_1
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001
scale: 1000
